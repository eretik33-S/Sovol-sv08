# BTT Eddy Duo (Mainline 0.13)
#################################################################

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044340410A4331C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 85

[probe_eddy_current btt_eddy]
sensor_type: ldc1612
i2c_mcu: eddy
i2c_bus: i2c0f

x_offset: -16
y_offset: 11.5

descend_z: 0.5
#tap_threshold: 3788.081        # будет откалибровано
tap_z_offset: 0.0

[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
calibration_position: 319,176,5