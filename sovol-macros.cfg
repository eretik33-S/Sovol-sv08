#################################################################
# 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И БЕЗОПАСНОСТЬ
#################################################################
[gcode_macro _global_var]
variable_pause_park: {'x': 10, 'y': 340, 'z': 50, 'e': 1}
variable_cancel_park: {'x': 10, 'y': 340, 'z': 50, 'e': 1}
variable_z_maximum_lifting_distance: 345
variable_pause_resume_travel_speed: 150
variable_load_filament_extruder_temp: 230
gcode: # Пустой, используется только для хранения переменных

[force_move]
enable_force_move: False

#################################################################
# 2. УТИЛИТЫ И ОЧИСТКА СОПЛА
#################################################################
[gcode_macro mainled_on]
gcode: SET_LED LED=main_led WHITE=1

[gcode_macro mainled_off]
gcode: SET_LED LED=main_led WHITE=0

[gcode_macro CLEAN_NOZZLE_TAP]
description: "Safe nozzle cleaning for TAP calibration"
variable_brush_start_x: 315
variable_brush_end_x: 350
variable_brush_y: 360
variable_brush_z: 1
variable_end_x: 200
variable_end_y: 100
variable_end_z: 5
variable_wipe_repeat: 5
variable_zigzag_repeat: 3
gcode:
    {% if printer.toolhead.homed_axes|lower != "xyz" %} G28 {% endif %}
    G90
    M117 Cleaning nozzle...
    G1 X{brush_start_x} Y{brush_y} F9000
    G1 Z{brush_z} F300
    {% for i in range(wipe_repeat) %}
        G1 X{brush_end_x} F4500
        G1 X{brush_start_x} F4500
    {% endfor %}
    G1 Z{brush_z + 4} F300
    G1 X{brush_start_x} Y{brush_y - 4} F6000
    G1 Z{brush_z} F300
    {% for i in range(zigzag_repeat) %}
        {% set current_x = brush_start_x + 2 + (i * 8) %}
        G1 Y{brush_y} X{current_x} F4500
        G1 Y{brush_y - 3} X{current_x + 2}
        G1 Y{brush_y} X{current_x + 4}
        G1 Y{brush_y - 3} X{current_x + 6}
        G1 Y{brush_y} X{current_x + 8}
    {% endfor %}
    G1 Z{brush_z + 4} F300
    G1 X{end_x} Y{end_y} Z{end_z} F6000
    M117 Nozzle cleaned

#################################################################
# 3. УМНЫЕ ОБОЛОЧКИ (SMART WRAPPERS)
#################################################################
[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: QUAD_GANTRY_LEVEL_BASE
description: Heated QGL with smart checks
gcode:
    {% set bed_temp = params.BED_TEMP|default(65)|float %}
    {% set nozzle_temp = params.NOZZLE_TEMP|default(150)|float %}
    
    {% if printer.heater_bed.temperature|int < bed_temp - 2 %}
        M140 S{bed_temp}
        M190 S{bed_temp}
    {% endif %}
    {% if printer.extruder.temperature|int < nozzle_temp - 2 %}
        M104 S{nozzle_temp}
        M109 S{nozzle_temp}
    {% endif %}
    
    {% if printer.toolhead.homed_axes|lower != "xyz" %} G28 {% else %} G28 Z {% endif %}
    
    QUAD_GANTRY_LEVEL_BASE
    BED_MESH_CLEAR

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
description: Heated bed mesh with smart checks
gcode:
    {% set bed_temp = params.BED_TEMP|default(65)|float %}
    {% set method = params.METHOD|default('rapid_scan') %}
    {% set adaptive = params.ADAPTIVE|default(1) %}
    
    {% if printer.heater_bed.temperature|int < bed_temp - 2 %}
        M140 S{bed_temp}
        M190 S{bed_temp}
    {% endif %}
    
    {% if printer.toolhead.homed_axes|lower != "xyz" %} G28 {% else %} G28 Z {% endif %}
    
    BED_MESH_CLEAR
    {% if adaptive == 1 %}
        BED_MESH_CALIBRATE_BASE ADAPTIVE=1 METHOD={method}
    {% else %}
        BED_MESH_CALIBRATE_BASE METHOD={method}
    {% endif %}

#################################################################
# 4. КАЛИБРОВКА Z-OFFSET (TAP)
#################################################################
[gcode_macro TAP_CALIBRATE]
description: Safe Eddy TAP calibration (Visible in Mainsail/Fluidd UI)
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(65)|float %}
    {% set NOZZLE_TEMP = params.NOZZLE_TEMP|default(150)|float %}

    M117 TAP Auto Calibrate
    {action_respond_info("Starting FULL AUTO Eddy TAP calibration...")}

    M140 S{BED_TEMP}
    M104 S{NOZZLE_TEMP}
    M190 S{BED_TEMP}
    M109 S{NOZZLE_TEMP}

    G28
    QUAD_GANTRY_LEVEL_BASE
    CLEAN_NOZZLE_TAP

    G90
    G0 X175 Y175 Z10 F9000

    {action_respond_info("Running PROBE_EDDY_CURRENT_TAP_CALIBRATE...")}
    PROBE_EDDY_CURRENT_TAP_CALIBRATE

    M400
    {action_respond_info("TAP done. Saving config automatically...")}
    SAVE_CONFIG

#################################################################
# 5. START_PRINT / END_PRINT / PAUSE / RESUME (ИСПРАВЛЕННЫЕ)
#################################################################
[gcode_macro START_PRINT]
description: Standard start print sequence
gcode:
    {% set bedtemp = params.BED_TEMP|default(65)|int %}
    {% set hotendtemp = params.EXTRUDER_TEMP|default(240)|int %}
    
    M117 Starting Print...
    CLEAR_PAUSE
    BED_MESH_CLEAR
    
    {% if printer['filament_switch_sensor filament_sensor'].enabled == True and printer['filament_switch_sensor filament_sensor'].filament_detected != True %}
        {action_raise_error("START_PRINT: No filament detected!")}
    {% endif %}

    # ЯВНЫЙ НАГРЕВ: Так как мы вызываем _BASE напрямую для экономии времени (избегаем лишнего G28 Z),
    # мы обязаны явно нагреть стол и сопло до температуры зондирования (150°C).
    M140 S{bedtemp}
    M190 S{bedtemp}
    M104 S150
    M109 S150
    
    G28
    
    # Вызов _BASE напрямую после G28 (обёртки не вызовут лишний G28 Z)
    QUAD_GANTRY_LEVEL_BASE
    BED_MESH_CALIBRATE_BASE ADAPTIVE=1 METHOD=rapid_scan
    
    # Нагрев до финальной температуры печати
    M104 S{hotendtemp}
    M109 S{hotendtemp}
    
    # ИСПРАВЛЕНИЕ 1: Явная установка Pressure Advance из конфига
    SET_PRESSURE_ADVANCE ADVANCE={printer.configfile.settings.extruder.pressure_advance|default(0)}
    
    # Безопасный раздельный спуск по Z перед праймом
    G90
    G0 Z10 F600
    G0 X30 Y20 F9000
    G0 Z0.35 F600
    
    G92 E0
    G1 X30 Y160 E15 F1500
    G1 X30.4 Y160 F9000
    G1 X30.4 Y20 E15 F1500
    G1 E-0.5 F1800
    G92 E0
    M117 Printing...

[gcode_macro END_PRINT]
description: Standard end print sequence
gcode:
    M117 Print Finished
    M400
    
    {% set z_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance|float %}
    {% set current_z = printer.gcode_move.position.z|float %}
    {% if current_z < z_max %}
        G1 Z{[current_z + 10, z_max]|min} F600
    {% endif %}
    
    G90
    G0 X10 Y340 F9000
    TURN_OFF_HEATERS
    M106 S0
    BED_MESH_CLEAR
    M84 X Y Z E
    CLEAR_PAUSE

[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
    {% set x_park = printer['gcode_macro _global_var'].pause_park.x|float %}
    {% set y_park = printer['gcode_macro _global_var'].pause_park.y|float %}
    {% set e_restract = printer['gcode_macro _global_var'].pause_park.e|float %}
    {% set z_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance|float %}
    {% set current_z = printer.gcode_move.position.z|float %}
    {% set e_mintemp = printer.configfile.settings['extruder'].min_extrude_temp|float %}
    
    PAUSE_BASE
    G91
    
    {% if printer.extruder.temperature >= e_mintemp %}
        G1 E-{e_restract} F300
    {% endif %}
    
    {% if current_z < z_max %}
        G1 Z{[current_z + 10, z_max]|min} F3000
    {% endif %}
    G90
    
    {% if printer.gcode_move.position.x != x_park or printer.gcode_move.position.y != y_park %}
        G1 X{x_park} Y{y_park} F9000
    {% endif %}

[gcode_macro RESUME]
rename_existing: RESUME_BASE
gcode:
    {% set e_restract = printer['gcode_macro _global_var'].pause_park.e|float %}
    {% set e_mintemp = printer.configfile.settings['extruder'].min_extrude_temp|float %}
    {% set sensor_enabled = printer['filament_switch_sensor filament_sensor'].enabled|default(false) %}
    {% set has_filament = printer['filament_switch_sensor filament_sensor'].filament_detected|default(true) %}
    {% set target_temp = printer.extruder.target|float %}
    
    {% if sensor_enabled and not has_filament %}
        {action_respond_info("WARNING: No filament detected! Please load filament before resuming.")}
        {action_raise_error("RESUME aborted: Filament missing. Load filament and try again.")}
    {% endif %}
    
    {% if target_temp <= 0 %}
        {action_respond_info("Extruder target temperature is 0. Cannot prime. Please set temperature and resume manually.")}
        {action_raise_error("RESUME aborted: Extruder target temp is 0.")}
    {% endif %}

    {action_respond_info("Print resuming!")}
    
    {% if printer.extruder.temperature >= e_mintemp %}
        G91
        G1 E{e_restract} F300
        G90
    {% else %}
        {action_respond_info("Nozzle too cold to prime. Heating to target...")}
        M109 S{target_temp}
        G91
        G1 E{e_restract} F300
        G90
    {% endif %}
    
    RESUME_BASE

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
    CANCEL_PRINT_BASE
    
    # ИСПРАВЛЕНИЕ 2: Строгий порядок: 1. Подъем Z -> 2. Парковка XY -> 3. Выключение -> 4. M84
    {% set z_max = printer['gcode_macro _global_var'].z_maximum_lifting_distance|float %}
    {% set current_z = printer.gcode_move.position.z|float %}
    
    G91
    {% if current_z < z_max %}
        G1 Z{[current_z + 10, z_max]|min} F3000
    {% endif %}
    
    {% set x_park = printer['gcode_macro _global_var'].cancel_park.x|float %}
    {% set y_park = printer['gcode_macro _global_var'].cancel_park.y|float %}
    G90
    G1 X{x_park} Y{y_park} F9000
    
    TURN_OFF_HEATERS
    M106 S0
    CLEAR_PAUSE
    
    # M84 строго после завершения всех движений парковки
    M84 X Y Z E

#################################################################
# 6. ЗАГРУЗКА / ВЫГРУЗКА ФИЛАМЕНТА
#################################################################
[gcode_macro LOAD_FILAMENT]
gcode:
    {% if printer.print_stats.state == "printing" %}
        {action_raise_error("Don't load filament during printing!")}
    {% endif %}
    
    {% set temp = printer['gcode_macro _global_var'].load_filament_extruder_temp|int %}
    {% if printer.extruder.temperature < temp - 5 %}
        M104 S{temp}
        M109 S{temp}
    {% endif %}
    G91
    G1 E75 F300
    G1 E30 F150
    G90
    M117 Filament loaded.

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer.print_stats.state == "printing" %}
        {action_raise_error("Don't unload filament during printing!")}
    {% endif %}
    
    {% set temp = printer['gcode_macro _global_var'].load_filament_extruder_temp|int %}
    {% if printer.extruder.temperature < temp - 5 %}
        M104 S{temp}
        M109 S{temp}
    {% endif %}
    G91
    G1 E+25 F300
    G1 E-10 F1500
    G1 E-20 F600
    G4 P3000
    G1 E-50 F300 
    G90
    M117 Filament ejected.

#################################################################
# 7. ИСПРАВЛЕННЫЕ M109 / M190
#################################################################
[gcode_macro M109]
rename_existing: M99109
gcode:    
    {% set s = params.S|float %}    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s-2} MAXIMUM={s+5}   
    {% endif %}
    
[gcode_macro M190]
rename_existing: M99190
gcode:    
    {% set s = params.S|float %}
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-2} MAXIMUM={s+5}  
    {% endif %}

#################################################################
# 8. ВОССТАНОВЛЕННЫЕ УТИЛИТЫ
#################################################################
[gcode_macro M600]
description: Filament change (State-based auto-unload intentionally removed for simplicity)
gcode: PAUSE

[gcode_macro CENTER]
gcode: G0 X175 Y175 F5000

[gcode_macro _ALL_FAN_OFF]
gcode: 
    M106 S0

[gcode_macro _IDLE_TIMEOUT]
gcode:
    {% if printer.print_stats.state == "paused" %}
      RESPOND TYPE=echo MSG="No operations in 10min!"
    {% else %}
     M84
     TURN_OFF_HEATERS
    {% endif %}

[delayed_gcode bed_mesh_init]
initial_duration: .01
gcode:
    # ИСПРАВЛЕНИЕ 3: Загружаем профиль только если он существует И еще не активен
    {% if 'default' in printer.bed_mesh.profiles and printer.bed_mesh.profile_name != 'default' %}
        BED_MESH_PROFILE LOAD=default
    {% endif %}

[delayed_gcode exhaust_fan_off]
gcode:
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0

[delayed_gcode TEST_BELT]
initial_duration: 0.3
gcode:
    {% set x_freq = printer.save_variables.variables.x_freq|default(0)|float %}
    {% set y_freq = printer.save_variables.variables.y_freq|default(0)|float %}
    {% set show_freq = printer.save_variables.variables.show_freq|default(0) %}
    {% if show_freq == 1 %}
        M117 x {x_freq}, y {y_freq}
        SAVE_VARIABLE VARIABLE=show_freq VALUE=0
    {% endif %}